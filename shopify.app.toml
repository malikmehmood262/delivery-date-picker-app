# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "1698898c1d321581732990cad185cd8a"
name = "SlotSync"
application_url = "https://example.com"
embedded = true

[access_scopes]
scopes = "write_products,write_metaobjects,write_metaobject_definitions,read_orders,write_orders"

[app_proxy]
url = "https://example.com/proxy/delivery"
subpath = "delivery"
prefix = "apps"

[webhooks]
api_version = "2026-07"
  # Webhooks are registered programmatically in shopify.server.js via
  # afterAuth → shopify.registerWebhooks({ session }).
  # Declaring subscriptions here causes localhost URI errors in dev mode.

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
